<div class="project" data-id="{{ p.id }}">
  <div class="project-header">
    <div>
      <div class="project-nome">{{ p.nome }}</div>
      {% if p.objetivo %}<div class="project-objetivo">{{ p.objetivo }}</div>{% endif %}
    </div>
    <button class="del-project" onclick="deletarProjeto('{{ p.id }}')">✕</button>
  </div>

  <div class="progresso-row">
    <span class="progresso"><strong>{{ p.progresso }}</strong> concluídas</span>
    <span class="progresso-pct">{{ p.progresso_pct }}%</span>
  </div>
  <div class="bar"><div class="bar-fill" style="width: {{ p.progresso_pct }}%"></div></div>

  <div class="tasks sortable-tasks" data-project-id="{{ p.id }}">
    {% for item in p.itens %}
      {% if item.is_titulo %}
      <div class="item-titulo" data-id="{{ item.id }}">
        <span class="drag-handle">⋮⋮</span>
        <span class="item-titulo-texto">{{ item.descricao }}</span>
        <button class="del-task" onclick="deletarTask('{{ item.id }}')">✕</button>
      </div>
      {% else %}
      <div class="task {{ 'done' if item.done else '' }}" data-id="{{ item.id }}">
        <span class="drag-handle">⋮⋮</span>
        <input type="checkbox" {{ 'checked' if item.done else '' }} onchange="toggleTask('{{ item.id }}', this.checked)">
        <span class="descricao">{{ item.descricao }}</span>
        <button class="del-task" onclick="deletarTask('{{ item.id }}')">✕</button>
      </div>
      {% endif %}
    {% endfor %}
  </div>

  <div class="add-section">
    <input
      type="text"
      class="nova-secao-input"
      placeholder="Nome da nova seção..."
      onkeydown="if(event.key==='Enter'){ event.preventDefault(); criarTitulo('{{ p.id }}', this); }"
    >
    <button onclick="criarTitulo('{{ p.id }}', this.previousElementSibling)">+ Seção</button>
  </div>

  <div class="add-task">
    <div class="add-task-row">
      <textarea
        placeholder="Cole ou digite tarefas (separadas por vírgula ou linha)"
        rows="1"
        onkeydown="if(event.key==='Enter' && !event.shiftKey){ event.preventDefault(); adicionarTask('{{ p.id }}', this); }"
        oninput="this.rows = this.value.split('\n').length"
      ></textarea>
      <button onclick="adicionarTask('{{ p.id }}', this.previousElementSibling)">+</button>
    </div>
  </div>
</div>
