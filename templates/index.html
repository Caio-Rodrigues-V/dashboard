<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Projetos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, system-ui, sans-serif; background: #0f1115; color: #e8e8e8; padding: 24px; }
    .container { max-width: 1000px; margin: 0 auto; }
    h1 { font-size: 22px; margin-bottom: 20px; }

    .new-project { background: #1a1d24; border: 1px solid #2a2e38; border-radius: 10px; padding: 16px; margin-bottom: 24px; }
    .new-project input, .new-project textarea, .new-project select {
      width: 100%; background: #0f1115; border: 1px solid #2a2e38; color: #e8e8e8;
      border-radius: 6px; padding: 8px 10px; margin-bottom: 8px; font-size: 14px; font-family: inherit;
    }
    .new-project button {
      background: #4f7cff; color: white; border: none; border-radius: 6px;
      padding: 8px 16px; cursor: pointer; font-size: 14px;
    }
    .new-project button:hover { background: #3d68ed; }

    .columns { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 720px) { .columns { grid-template-columns: 1fr; } }

    .column-title { font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; color: #9499a6; margin-bottom: 10px; }

    .project { background: #1a1d24; border: 1px solid #2a2e38; border-radius: 10px; padding: 16px; margin-bottom: 14px; }
    .project-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .project-nome { font-size: 16px; font-weight: 600; }
    .project-objetivo { font-size: 13px; color: #9499a6; margin-top: 4px; }
    .progresso { font-size: 12px; color: #9499a6; margin-top: 6px; }
    .bar { height: 4px; background: #2a2e38; border-radius: 2px; margin-top: 4px; overflow: hidden; }
    .bar-fill { height: 100%; background: #4f7cff; }

    .del-project { background: none; border: none; color: #6a6f7a; cursor: pointer; font-size: 16px; }
    .del-project:hover { color: #e8576a; }

    .tasks { margin-top: 12px; }
    .task { display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 14px; }
    .task input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; }
    .task.done .descricao { text-decoration: line-through; color: #6a6f7a; }
    .task .descricao { flex: 1; }
    .task .del-task { background: none; border: none; color: #4a4f5a; cursor: pointer; font-size: 13px; visibility: hidden; }
    .task:hover .del-task { visibility: visible; }

    .add-task { display: flex; gap: 6px; margin-top: 10px; }
    .add-task input {
      flex: 1; background: #0f1115; border: 1px solid #2a2e38; color: #e8e8e8;
      border-radius: 6px; padding: 6px 10px; font-size: 13px;
    }
    .add-task button {
      background: #2a2e38; color: #e8e8e8; border: none; border-radius: 6px;
      padding: 6px 12px; cursor: pointer; font-size: 13px;
    }
    .add-task button:hover { background: #353a46; }

    .empty { color: #6a6f7a; font-size: 14px; text-align: center; padding: 30px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📋 Painel de Projetos</h1>

    <div class="new-project">
      <input type="text" id="novo-nome" placeholder="Nome do projeto">
      <textarea id="novo-objetivo" placeholder="Objetivo do projeto" rows="2"></textarea>
      <select id="novo-tipo">
        <option value="pessoal">Pessoal</option>
        <option value="freelance">Freelance</option>
      </select>
      <button onclick="criarProjeto()">+ Adicionar projeto</button>
    </div>

    <div class="columns">
      <div>
        <div class="column-title">Freelance</div>
        {% for p in freelance %}
          {% include "_project_card.html" %}
        {% else %}
          <div class="empty">Nenhum projeto freelance ainda.</div>
        {% endfor %}
      </div>

      <div>
        <div class="column-title">Pessoal</div>
        {% for p in pessoal %}
          {% include "_project_card.html" %}
        {% else %}
          <div class="empty">Nenhum projeto pessoal ainda.</div>
        {% endfor %}
      </div>
    </div>
  </div>

  <script>
    async function criarProjeto() {
      const nome = document.getElementById('novo-nome').value.trim();
      const objetivo = document.getElementById('novo-objetivo').value.trim();
      const tipo = document.getElementById('novo-tipo').value;
      if (!nome) return;

      await fetch('/projects', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome, objetivo, tipo })
      });
      location.reload();
    }

    async function deletarProjeto(id) {
      if (!confirm('Excluir este projeto e todas as tarefas?')) return;
      await fetch(`/projects/${id}`, { method: 'DELETE' });
      location.reload();
    }

    async function adicionarTask(projectId, input) {
      const descricao = input.value.trim();
      if (!descricao) return;

      await fetch(`/projects/${projectId}/tasks`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ descricao })
      });
      location.reload();
    }

    async function toggleTask(id, done) {
      await fetch(`/tasks/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ done })
      });
      location.reload();
    }

    async function deletarTask(id) {
      await fetch(`/tasks/${id}`, { method: 'DELETE' });
      location.reload();
    }
  </script>
</body>
</html>
